# Somnia Docker Compose
# Run with: docker compose up -d

services:
  somnia:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: somnia
    restart: unless-stopped
    ports:
      - "8010:8010"   # Flask API
      - "8011:8011"   # MCP server (SSE)
    volumes:
      - ..:/app:ro
    env_file:
      - ../.env
    environment:
      - SOMNIA_PORT=8010
      - SOMNIA_MCP_PORT=8011
      - SOMNIA_DEBUG=false
      - OP_SERVICE_ACCOUNT_TOKEN=${OP_SERVICE_ACCOUNT_TOKEN}
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mcp-net:
    external: true
