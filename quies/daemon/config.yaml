# Quies Daemon Configuration
#
# All values can be overridden via environment variables using the
# QUIES_ prefix with double-underscore section separators:
#   QUIES_SCHEDULER__GLOBAL_COOLDOWN_MINUTES=120
#   QUIES_BUDGET__MAX_COST_PER_DAY=3.00
#   QUIES_API__MODEL=claude-sonnet-4-20250514
#
# Defaults for every parameter are defined in daemon/settings.py.
# This file overrides those defaults; env vars override this file.

# Dream scheduler (background thread)
scheduler:
  enabled: true
  check_interval_minutes: 15        # how often to check if dreaming is needed
  global_cooldown_minutes: 240      # 4 hours between ANY autonomous phase
  rumination_cooldown_minutes: 360  # 6 hours between rumination sessions
  solo_work_cooldown_minutes: 360   # 6 hours between solo-work sessions
  archaeology_cooldown_minutes: 720 # 12 hours between archaeology sessions
  solo_work_max_duration_minutes: 20  # wall clock limit for solo-work
  min_nodes_for_rumination: 5       # need enough knowledge to reflect on
  min_inbox_items: 1                # minimum inbox depth to trigger processing

  # Work-queue cycle budgets
  cycle_max_tokens: 50000
  cycle_max_seconds: 1200

  # SLTM opportunistic sampling during rumination
  sltm_opportunistic_probability: 0.30
  sltm_opportunistic_limit: 8

# Budget & cost controls
budget:
  max_cost_per_day: 2.00        # hard cap across all autonomous phases
  max_cost_dream: 0.30          # per-session cap for processing dreams
  max_cost_rumination: 0.30     # per-session cap for rumination
  max_cost_solo_work: 1.00      # per-session cap for solo-work
  max_cost_archaeology: 0.30    # per-session cap for archaeology

# API configuration
api:
  credentials_ref: "op://Key Vault/Somnia Harvester API Key/password"
  oauth_credentials_ref: "op://Key Vault/Claude Code OAuth/credential"
  model: "claude-sonnet-4-20250514"
  max_tokens: 8192
  max_tokens_per_mode:
    process:       16000
    ruminate:       8000
    solo_work:     16000
    archaeologize:  4000

# Graph parameters
graph:
  subgraph_depth: 3
  max_context_nodes: 50

# Decay settings
decay:
  passive_cooldown_per_cycle: 0.0005  # per scheduler tick (~15min). ~0.048/day
  sltm_threshold: 0.05               # nodes below this demote to SLTM
  pinned_floor: 0.5                  # pinned nodes won't decay below this
  prune_threshold: 0.1               # future: archive nodes below this
  stable_reinforcement_count: 5
  reinforcement_floor: 0.20
  dream_edge_warmth: 0.03
  connectivity_decay_reduction: true
  connectivity_tiers:
    5: 0.75
    10: 0.50
    20: 0.25
  foundational_floor: 0.35
  connectivity_floor_per_edge: 0.01
  connectivity_floor_max: 0.30
  type_profiles:
    personality:       { rate_multiplier: 0.05, floor: 0.40 }
    archetype:         { rate_multiplier: 0.10, floor: 0.35 }
    concept:           { rate_multiplier: 0.30, floor: 0.20 }
    principle:         { rate_multiplier: 0.30, floor: 0.20 }
    insight:           { rate_multiplier: 0.60, floor: 0.10 }
    fact:              { rate_multiplier: 1.00, floor: 0.05 }
    procedure:         { rate_multiplier: 1.00, floor: 0.05 }
    memory:            { rate_multiplier: 1.00, floor: 0.00 }
    event:             { rate_multiplier: 1.00, floor: 0.00 }
    wondering-thread:  { rate_multiplier: 0.70, floor: 0.05 }

# Edge lifecycle
edges:
  decay_window_days: 90
  decay_factor: 0.95
  prune_weight_threshold: 0.10
  archive_after_flags: 3

# Logging
logging:
  level: INFO
  dream_traces: true
