# Somnia Daemon Configuration

# Consolidation triggers
consolidation:
  min_inbox_items: 1

# Dream scheduler (background thread)
scheduler:
  enabled: true
  check_interval_minutes: 15        # how often to check if dreaming is needed
  global_cooldown_minutes: 240      # 4 hours between ANY autonomous phase
  rumination_cooldown_minutes: 360  # 6 hours between rumination sessions
  solo_work_cooldown_minutes: 360   # 6 hours between solo-work sessions
  min_nodes_for_rumination: 5       # need enough knowledge to reflect on
  solo_work_max_duration_minutes: 20  # wall clock limit for solo-work
  archaeology_cooldown_minutes: 720   # 12 hours between archaeology sessions

  # Work-queue cycle budgets (Track A Phase 2 — process_stm and later activities).
  # cycle_max_tokens is a soft ceiling across all handler iterations in one tick;
  # cycle_max_seconds is a hard wall-clock cap. Per-handler cost enforcement
  # (daily cap, per-session cap) still lives in the activity's d_fn and in
  # run_consolidation itself.
  cycle_max_tokens: 50000
  cycle_max_seconds: 1200

# Budget & cost controls
budget:
  max_cost_per_day: 2.00        # hard cap across all autonomous phases
  max_cost_dream: 0.30          # per-session cap for processing dreams
  max_cost_rumination: 0.30     # per-session cap for rumination
  max_cost_solo_work: 1.00      # per-session cap for solo-work
  max_cost_archaeology: 0.30    # per-session cap for archaeology

# API configuration
api:
  credentials_ref: "op://Key Vault/Somnia Harvester API Key/password"
  oauth_credentials_ref: "op://Key Vault/Claude Code OAuth/credential"
  model: "claude-sonnet-4-20250514"
  max_tokens: 8192
  max_tokens_per_mode:
    process:       16000
    ruminate:       8000
    solo_work:     16000
    archaeologize:  4000

# Graph parameters
graph:
  subgraph_depth: 3
  max_context_nodes: 50

# Decay settings
decay:
  passive_cooldown_per_cycle: 0.0005  # per scheduler check (~15min). ~0.048/day, ~20 days to fully cool
  sltm_threshold: 0.05               # nodes below this decay demote to SLTM (super long-term)
  pinned_floor: 0.5                  # pinned nodes won't decay below this
  prune_threshold: 0.1               # future: archive nodes below this
  stable_reinforcement_count: 5
  reinforcement_floor: 0.20          # nodes reinforced >= stable_reinforcement_count times won't decay below this
  dream_edge_warmth: 0.03            # warmth applied to nodes when dream creates an edge to them
  connectivity_decay_reduction: true  # nodes with more edges decay slower
  connectivity_tiers:                 # edge_count: decay_multiplier (lower = slower cooling)
    5: 0.75                           # 5+ edges: 75% of normal decay
    10: 0.50                          # 10+ edges: 50% of normal decay
    20: 0.25                          # 20+ edges: 25% of normal decay

  # ── Decay reform (pg_009) ─────────────────────────────────────────────
  # Hard floor for foundational=true nodes. Overrides everything else.
  foundational_floor: 0.35

  # Per-edge floor contribution for the connectivity floor.
  # Effective floor = min(connectivity_floor_max, edge_count * connectivity_floor_per_edge)
  # Example: a node with 22 edges has connectivity_floor = min(0.30, 0.22) = 0.22
  # Example: a node with 37 edges has connectivity_floor = min(0.30, 0.37) = 0.30
  connectivity_floor_per_edge: 0.01
  connectivity_floor_max: 0.30

  # Type-based decay profiles. Each profile is (rate_multiplier, floor).
  # rate_multiplier scales the base passive_cooldown_per_cycle for nodes of
  # that type. floor is the type's minimum decay_state — protects core
  # conceptual nodes from time-decay alone.
  #
  # Effective floor for any node = max(
  #     pinned_floor (if pinned),
  #     foundational_floor (if foundational),
  #     type_profile.floor,
  #     connectivity_floor (computed from edge count),
  #     reinforcement_floor (if reinforced enough)
  # )
  #
  # Whichever protection applies most strongly wins.
  type_profiles:
    personality:    { rate_multiplier: 0.05, floor: 0.40 }  # DCAT loop — character traits
    archetype:      { rate_multiplier: 0.10, floor: 0.35 }  # foundational patterns
    concept:        { rate_multiplier: 0.30, floor: 0.20 }  # durable ideas
    principle:      { rate_multiplier: 0.30, floor: 0.20 }  # durable ideas
    insight:        { rate_multiplier: 0.60, floor: 0.10 }  # significant but time-bound
    fact:           { rate_multiplier: 1.00, floor: 0.05 }  # standard rate
    procedure:      { rate_multiplier: 1.00, floor: 0.05 }  # standard rate
    memory:         { rate_multiplier: 1.00, floor: 0.00 }  # episodic — can fully fade
    event:          { rate_multiplier: 1.00, floor: 0.00 }  # episodic — can fully fade
    wondering-thread: { rate_multiplier: 0.70, floor: 0.05 }  # semi-durable exploration

# Logging
logging:
  level: INFO
  dream_traces: true
