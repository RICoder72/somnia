# Somnia — Docker Compose
#
# Three services + PostgreSQL on a shared network.
# Configure credentials in .env before starting.
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d quies    # Start just the memory service
#   docker compose logs -f quies  # Follow logs

services:
  postgres:
    image: postgres:16-alpine
    container_name: somnia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: somnia
      POSTGRES_USER: ${POSTGRES_USER:-somnia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-somnia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  quies:
    build:
      context: quies
      dockerfile: docker/Dockerfile
    container_name: quies
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8010:8010"   # Flask API
      - "8011:8011"   # MCP server (SSE)
    volumes:
      - ./quies:/app:ro
      - quies-data:/data/somnia
    environment:
      SOMNIA_PORT: "8010"
      SOMNIA_MCP_PORT: "8011"
      SOMNIA_DEBUG: "false"
      SOMNIA_DATABASE_URL: "postgresql://${POSTGRES_USER:-somnia}:${POSTGRES_PASSWORD}@somnia-postgres:5432/somnia"
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vigil:
    build:
      context: vigil
      dockerfile: Dockerfile
    container_name: vigil
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${SOMNIA_CONFIG_DIR:-./config}:/data/config:ro
      - ${SOMNIA_DOMAINS_DIR:-./domains}:/data/domains
      - ${SOMNIA_REPOS_DIR:-./}:/data/repos
      - ${SOMNIA_OUTPUTS_DIR:-./outputs}:/data/outputs
      - ${SOMNIA_DOCUMENTS_DIR:-./documents}:/data/documents
    environment:
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN:-}
      CREDENTIALS_API_KEY: ${CREDENTIALS_API_KEY:-}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-somnia}:${POSTGRES_PASSWORD}@somnia-postgres:5432/somnia"
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/vigil | grep -qE '[24][0-9][0-9]|406'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  fabrica:
    build:
      context: fabrica
      dockerfile: Dockerfile
    container_name: fabrica
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}:/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/fabrica | grep -qE '[24][0-9][0-9]|406'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  forge:
    build:
      context: forge
      dockerfile: Dockerfile
    container_name: forge
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/forge/workspace:/workspace
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/outputs:/outputs
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/repos:/repos
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8003/forge | grep -qE '[24][0-9][0-9]|406'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  portal:
    build:
      context: portal
      dockerfile: Dockerfile
    container_name: portal
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ${SOMNIA_CONFIG_DIR:-./config}:/data/config:ro
      - ${SOMNIA_DOMAINS_DIR:-./domains}:/data/domains:ro
    environment:
      PORTAL_DB_URL: "postgresql://${POSTGRES_USER:-somnia}:${POSTGRES_PASSWORD}@somnia-postgres:5432/somnia"
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/portal/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  router:
    image: nginx:alpine
    container_name: somnia-router
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/repos/somnia/router/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/outputs:/outputs:ro
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/domains:/domains:ro
      - ${SOMNIA_DATA_ROOT:-/volume1/docker/somnia}/repos/somnia/router/domains-index:/domains-index:ro
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  pgdata:
  quies-data:

networks:
  mcp-net:
    external: true
