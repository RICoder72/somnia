events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Docker embedded DNS — resolve container names at request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SSE/streaming-friendly defaults
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_connect_timeout 10s;
    proxy_buffering off;
    proxy_cache off;

    server {
        listen 8080;
        server_name _;
        absolute_redirect off;

        # ==================================================================
        # No-auth routes
        # ==================================================================

        # Health check
        location = /health {
            return 200 '{"status":"ok","service":"router"}';
            add_header Content-Type application/json;
        }

        # OAuth endpoints -> auth-service (no auth required)
        location ~ ^/(token|authorize|\.well-known) {
            set $auth_backend http://auth-service:3000;
            rewrite ^/(\.well-known/[^/]+)/.*$ /$1 break;
            proxy_pass $auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Browser login/logout -> auth-service (no auth required)
        location ~ ^/(login|logout) {
            set $auth_backend http://auth-service:3000;
            proxy_pass $auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
        }

        # ==================================================================
        # Internal auth subrequest
        # ==================================================================

        location = /auth {
            internal;
            set $auth_backend http://auth-service:3000;
            proxy_pass $auth_backend/auth;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # ==================================================================
        # Published outputs — SPA browser + file serving
        # ==================================================================

        # Exact /output/ → SPA file browser (served by Vigil)
        location = /output/ {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            set $vigil_backend http://vigil:8000;
            proxy_pass $vigil_backend/api/browser;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else under /output/ → actual files
        location /output/ {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            alias /outputs/;
            autoindex off;
            types {
                text/plain md txt;
                text/html html;
                application/json json;
                image/png png;
                image/jpeg jpg jpeg;
                image/gif gif;
                application/pdf pdf;
            }
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "no-cache";
        }

        # ==================================================================
        # Domain document browser (auth-gated)
        # ==================================================================

        location = /domains {
            auth_request /auth;
            error_page 401 = @auth_redirect;
            return 301 /domains/;
        }

        location = /domains/ {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            alias /domains-index/;
            index index.html;
            add_header Cache-Control "no-cache";
        }

        location ~ ^/domains/([^/]+)/(.*)$ {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            alias /domains/$1/documents/$2;
            autoindex on;
            autoindex_format html;
            types {
                text/plain md txt log csv;
                text/html html;
                application/json json;
                application/pdf pdf;
                image/png png;
                image/jpeg jpg jpeg;
                image/gif gif;
            }
            add_header Cache-Control "no-cache";
        }

        location ~ ^/domains/([^/]+)$ {
            return 301 /domains/$1/;
        }

        # ==================================================================
        # Store REST API (auth-gated, routed to Vigil)
        # ==================================================================

        location /api/ {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $vigil_backend http://vigil:8000;
            proxy_pass $vigil_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
        }

        # ==================================================================
        # MCP routes (all auth-gated)
        # ==================================================================

        # Vigil — core tools
        location /vigil {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $vigil_backend http://vigil:8000;
            proxy_pass $vigil_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        # Fabrica — admin/ops
        location /fabrica {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $fabrica_backend http://fabrica:8001;
            proxy_pass $fabrica_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        # Somnia — live dashboard
        location = /dashboard {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            set $somnia_api http://quies:8010;
            rewrite ^ /dashboard break;
            proxy_pass $somnia_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Somnia — internal API (dashboards, analytics)
        location /somnia/api/ {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            set $somnia_api http://quies:8010;
            rewrite ^/somnia/api/(.*)$ /$1 break;
            proxy_pass $somnia_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            add_header Access-Control-Allow-Origin * always;
        }

        # Somnia — memory (MCP)
        location /somnia {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $somnia_backend http://quies:8011;
            rewrite ^/somnia/mcp(.*)$ /somnia$1 break;
            proxy_pass $somnia_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        # Store — entity storage (legacy route, can remove once MCP config updated)
        location /store {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $store_backend http://vigil:8000;
            proxy_pass $store_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        # ==================================================================
        # Legacy compatibility
        # ==================================================================

        location /mcp {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $vigil_backend http://vigil:8000;
            rewrite ^/mcp(.*)$ /vigil$1 break;
            proxy_pass $vigil_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        location /ops {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $fabrica_backend http://fabrica:8001;
            rewrite ^/ops(.*)$ /fabrica$1 break;
            proxy_pass $fabrica_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }




        # Portal — web interface
        location /portal {
            auth_request /auth;
            error_page 401 = @auth_redirect;

            set $portal_backend http://portal:8002;
            proxy_pass $portal_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        # Forge — workbench MCP
        location /forge {
            auth_request /auth;
            error_page 401 = @auth_error;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_scope $upstream_http_x_user_scope;

            set $forge_backend http://forge:8003;
            proxy_pass $forge_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-User-ID $user_id;
            proxy_set_header X-User-Scope $user_scope;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding off;
        }

        # ==================================================================
        # Error handlers
        # ==================================================================

        # For browser requests: redirect to login
        location @auth_redirect {
            set $login_url /login?redirect=$request_uri;

            # Check if this looks like a browser request
            if ($http_accept ~* "text/html") {
                return 302 $login_url;
            }

            # Non-browser clients get JSON 401
            add_header WWW-Authenticate 'Bearer realm="Somnia"' always;
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }

        # For MCP/API requests: always JSON 401 (no redirect)
        location @auth_error {
            add_header WWW-Authenticate 'Bearer realm="Somnia"' always;
            add_header Content-Type application/json always;
            return 401 '{"error":"unauthorized"}';
        }

        location / {
            return 404 '{"error":"not_found"}';
            add_header Content-Type application/json always;
        }
    }
}